name: TSCP Anchor Pipeline

on:
  push:
    branches: [ master ]

jobs:
  anchor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --omit=optional --no-audit

      - name: Anchor RATIFIED artifacts
        env:
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          ANCHOR_CONTRACT_ADDRESS: ${{ secrets.ANCHOR_CONTRACT_ADDRESS }}
        run: node scripts/scan-ratified.mjs

      - name: Upload receipts
        uses: actions/upload-artifact@v4
        with:
          name: anchor-receipts
          path: anchor-receipts/
