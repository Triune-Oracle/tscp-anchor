name: WASM Smoke Test (JIT)

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  wasm-smoke:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build tscp-protocol for wasm32
        continue-on-error: true
        run: cargo build -p tscp-protocol --target wasm32-unknown-unknown --release

      - name: Run tscp-wasm-smoke with JIT
        continue-on-error: true
        run: cargo build -p tscp-wasm-smoke --features jit --locked

      - name: Execute smoke test
        continue-on-error: true
        run: cargo run -p tscp-wasm-smoke --features jit
