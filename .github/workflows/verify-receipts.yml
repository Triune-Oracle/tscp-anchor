name: Verify Receipts

on:
  push:
  pull_request:

jobs:
  verify-receipts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --omit=optional --ignore-scripts
      - run: npm run verify:offline
